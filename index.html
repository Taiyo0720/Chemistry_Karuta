<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>かるたアプリ（対戦型）</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
      background: #f7f7fb;
      margin: 0;
      padding: 12px;
      text-align: center;
      touch-action: manipulation;
    }

    h1 { margin-bottom: 6px; font-size: 1.3rem; }

    #score {
      display: flex;
      justify-content: space-around;
      margin: 8px 0;
      font-weight: bold;
      font-size: 1rem;
    }

    #yomi {
      font-size: 1.1rem;
      margin: 10px 0;
      padding: 10px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-top: 12px;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 10px;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      font-size: 1.2rem;
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }

    .card:hover { background: #ffffff; }
    .card:active { transform: scale(0.96); }

    .card.player { background: #c7f9cc; cursor: default; }
    .card.com { background: #ffd6d6; cursor: default; }

    #status { margin-top: 8px; font-weight: bold; font-size: 0.95rem; }

    button {
      margin-top: 14px;
      padding: 12px 28px;
      font-size: 1rem;
      border: none;
      border-radius: 999px;
      background: #6366f1;
      color: #fff;
      cursor: pointer;
    }

    @media (min-width: 600px) {
      .cards {
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      }
      h1 { font-size: 1.5rem; }
      #yomi { font-size: 1.3rem; }
    }
  </style>
</head>
<body>
  <h1>かるた対戦（あなた vs COM）</h1>

  <div id="score">
    <div>あなた：<span id="playerScore">0</span></div>
    <div>COM：<span id="comScore">0</span></div>
  </div>

  <div id="yomi">スタートを押してください</div>
  <div class="cards" id="cards"></div>
  <div id="status"></div>
  <button onclick="startGame()">スタート</button>

  <script>
    const karuta = [
      { tori: "Li⁺", yomi: [{text: "炎色反応で赤色を示した。", speak: "えんしょくはんのうであかいろをしめした"}]},
      { tori: "Na⁺", yomi: [{text: "炎色反応で黄色を示した。", speak: "えんしょくはんのうできいろをしめした"}]},
      { tori: "K⁺", yomi: [{text: "炎色反応で赤紫色を示した。", speak: "えんしょくはんのうであかむらさきいろをしめした"}]},
      { tori: "Ca²⁺", yomi: [{text: "炎色反応で橙赤色を示した。", speak: "えんしょくはんのうでとうせきしょくをしめした"}]},
      { tori: "Ba²⁺", yomi: [{text: "炎色反応で黄緑色を示した。", speak: "えんしょくはんのうできみどりいろをしめした"}]},
      { tori: "Cu²⁺", yomi: [{text: "炎色反応で青緑色を示した。", speak: "えんしょくはんのうであおみどりいろをしめした"}, {text: "ヘキサシアニド鉄（Ⅱ）酸カリウム水溶液を加えると赤褐色沈殿を生じた。", speak: "へきさしあにどてつに、さんかりうむすいようえきをくわえるとせきかっしょくちんでんをしょうじた"}, {text: "水酸化ナトリウム水溶液を加えると青白色沈殿を生じた。", speak: "すいさんかなとりうむすいようえきをくわえるとせいはくしょくちんでんをしょうじた"}, {text: "水酸化物の沈殿に過剰量のアンモニア水を加えると水溶液が深青色になった。", speak: "すいさんかぶつのちんでんにかじょうりょうのあんもにあすいをくわえるとすいようえきがしんせいしょくになった"}]}, //要検証
      { tori: "Sr²⁺", yomi: [{text: "炎色反応で紅色を示した。", speak: "えんしょくはんのうでくれないいろをしめした"}]},
      { tori: "Ne", yomi: [{text: "低圧放電すると赤色の光を発した。", speak: "ていあつほうでんするとあかいろのひかりをはっした"}]},
      { tori: "H₂S", yomi: [{text: "水で湿らせた酢酸鉛（Ⅱ）紙が黒変した。", speak: "みずでしめらせたさくさんなまりしがこくへんした"}]},
      { tori: "CO", yomi: [{text: "空気中で点火すると青色の炎をあげて燃焼し、二酸化炭素を生じた。", speak: "くうきちゅうでてんかするとあおいろのほのおをあげてねんしょうし、にさんかたんそをしょうじた"}]},
      { tori: "CO₂", yomi: [{text: "石灰水に通じると白濁した。", speak: "せっかいすいにつうじるとはくだくした"}]},
      { tori: "Cl₂", yomi: [{text: "さらし粉に希塩酸を加えると黄緑色の気体が生じた。", speak: "さらしこにきえんさんをくわえるときみどりいろのきたいがしょうじた"}]},
      { tori: "Al", yomi: [{text: "酸化鉄（Ⅲ）と混合して点火すると、多量の熱を発して融解した鉄を得た。", speak: "さんかてつさんとこんごうしててんかすると、たりょうのねつをはっしてゆうかいしたてつをえた"}]},
      { tori: "NH₃", yomi: [{text: "塩化水素と反応して白煙を生じた。", speak: "えんかすいそとはんのうしてはくえんをしょうじた"}]},
      { tori: "Zn²⁺", yomi: [{text: "硫化水素を通じると白色沈殿を生じた。", speak: "りゅうかすいそをつうじるとはくしょくちんでんをしょうじた"}]},
      { tori: "Mn²⁺", yomi: [{text: "硫化水素を通じると淡赤色沈殿を生じた。", speak: "りゅうかすいそをつうじるとたんせきしょくちんでんをしょうじた"}]},
      { tori: "Cd²⁺", yomi: [{text: "硫化水素を通じると黄色沈殿を生じた。", speak: "りゅうかすいそをつうじるとおうしょくちんでんをしょうじた"}]},
      { tori: "Sn²⁺", yomi: [{text: "硫化水素を通じると褐色沈殿を生じた。", speak: "りゅうかすいそをつうじるとかっしょくちんでんをしょうじた"}]},
      { tori: "Fe²⁺", yomi: [{text: "水酸化ナトリウム水溶液を加えると緑白色沈殿を生じた。", speak: "すいさんかなとりうむすいようえきをくわえるとりょくはくしょくちんでんをしょうじた"}, {text: "ヘキサシアニド鉄（Ⅲ）酸カリウム水溶液を加えると濃青色沈殿を生じた。", speak: "へきさしあにどてつさん、さんかりうむすいようえきをくわえるとのうせいしょくちんでんをしょうじた"}]},
      { tori: "Fe³⁺", yomi: [{text: "水酸化ナトリウム水溶液を加えると赤褐色沈殿を生じた。", speak: "すいさんかなとりうむすいようえきをくわえるとせきかっしょくちんでんをしょうじた"}, {text: "ヘキサシアニド鉄（Ⅱ）酸カリウム水溶液を加えると濃青色沈殿を生じた。", speak: "へきさしあにどてつに、さんかりうむすいようえきをくわえるとのうせいしょくちんでんをしょうじた"}, {text: "チオシアン酸カリウム水溶液を加えると水溶液が血赤色になった。", speak: "ちおしあんさんかりうむすいようえきをくわえるとすいようえきがけっせきしょくになった"}]},
      { tori: "H₂O", yomi: [{text: "硫酸銅（Ⅱ）無水物の粉末に垂らすと粉末が青変した。", speak: "りゅうさんどうに、むすいぶつのふんまつにたらすとふんまつがせいへんした"}, {text: "塩化コバルト紙が淡赤色になった。", speak: "えんかこばるとしがたんせきしょくになった"}]}
    ];

    let remaining = [];
    let current = null;
    let currentYomi = "";
    let playerScore = 0;
    let comScore = 0;
    let comTimer = null;

    const yomiEl = document.getElementById("yomi");
    const cardsEl = document.getElementById("cards");
    const statusEl = document.getElementById("status");
    const playerScoreEl = document.getElementById("playerScore");
    const comScoreEl = document.getElementById("comScore");

    function speak(text) {
      if (!('speechSynthesis' in window)) return;
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = "ja-JP";
      utter.rate = 1.2;
      speechSynthesis.cancel();
      speechSynthesis.speak(utter);
    }

    function startGame() {
      remaining = [...karuta];
      playerScore = 0;
      comScore = 0;
      updateScore();
      statusEl.textContent = "";
      drawCards();
      nextRound();
    }

    function drawCards() {
      cardsEl.innerHTML = "";
      karuta.forEach(item => {
        const div = document.createElement("div");
        div.className = "card";
        div.textContent = item.tori;
        div.onclick = () => selectCard(item, div);
        cardsEl.appendChild(div);
      });
    }

    function nextRound() {
      if (remaining.length === 0) {
        yomiEl.textContent = "ゲーム終了！";
        if (playerScore > comScore) statusEl.textContent = "あなたの勝ち 🎉";
        else if (playerScore < comScore) statusEl.textContent = "COMの勝ち 😈";
        else statusEl.textContent = "引き分け 🤝";
        return;
      }

      const index = Math.floor(Math.random() * remaining.length);
      current = remaining[index];

      const yomiIndex = Math.floor(Math.random() * current.yomi.length);
      const yomiObj = current.yomi[yomiIndex];
      
      yomiEl.textContent = yomiObj.text;
      speak(yomiObj.speak);

      const comDelay = 800 + Math.random() * 200 * currentYomi.length;
      clearTimeout(comTimer);
      comTimer = setTimeout(comTake, comDelay);
    }

    function selectCard(item, element) {
      if (item !== current) {
        statusEl.textContent = "ちがいます";
        setTimeout(() => statusEl.textContent = "", 500);
        return;
      }
      if (element.classList.contains("player") || element.classList.contains("com")) return;

      clearTimeout(comTimer);
      element.classList.add("player");
      playerScore++;
      statusEl.textContent = "あなたが取りました！";
      endRound();
    }

    function comTake() {
      const cards = document.querySelectorAll('.card');
      cards.forEach(card => {
        if (card.textContent === current.tori) {
          card.classList.add('com');
        }
      });
      comScore++;
      statusEl.textContent = "COMが取りました";
      endRound();
    }

    function endRound() {
      updateScore();
      remaining = remaining.filter(k => k !== current);
      setTimeout(() => {
        statusEl.textContent = "";
        nextRound();
      }, 900);
    }

    function updateScore() {
      playerScoreEl.textContent = playerScore;
      comScoreEl.textContent = comScore;
    }
  </script>
</body>
</html>
